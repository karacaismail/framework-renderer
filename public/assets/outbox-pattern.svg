<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 300" role="img" aria-labelledby="ob-t ob-d">
  <title id="ob-t">Outbox Pattern — Mesaj Kutusu</title>
  <desc id="ob-d">Modül A veriyi yazarken aynı transaction'da outbox tablosuna mesaj koyar; worker arkadan iletir.</desc>
  <style>
    .lab { font: 600 14px 'Inter', sans-serif; fill: #1f2937; }
    .head { font: 700 15px 'Inter', sans-serif; fill: #fff; }
    .arr { stroke: #6366f1; stroke-width: 2; fill: none; marker-end: url(#ar3); }
    .arr-dash { stroke: #94a3b8; stroke-width: 2; stroke-dasharray: 5,3; fill: none; marker-end: url(#ar3); }
  </style>
  <defs>
    <marker id="ar3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#6366f1"/>
    </marker>
  </defs>
  <rect x="20" y="120" width="140" height="70" rx="8" fill="#0f766e" />
  <text class="head" x="40" y="148">Modül A</text>
  <text class="lab" x="40" y="170" fill="#a7f3d0">veri yaz +</text>
  <text class="lab" x="40" y="186" fill="#a7f3d0">outbox satırı</text>

  <rect x="220" y="100" width="220" height="110" rx="8" fill="#fef3c7" stroke="#f59e0b" />
  <text class="head" x="250" y="128" fill="#92400e">DB transaction</text>
  <text class="lab" x="250" y="150">📦 records table</text>
  <text class="lab" x="250" y="170">📮 outbox table</text>
  <text class="lab" x="250" y="195" fill="#6b7280">ikisi birlikte commit/rollback</text>

  <rect x="490" y="40"  width="180" height="60" rx="8" fill="#dbeafe" stroke="#2563eb" />
  <text class="lab" x="510" y="68">⚙️ Worker</text>
  <text class="lab" x="510" y="88">outbox'tan oku</text>

  <rect x="490" y="200" width="180" height="60" rx="8" fill="#dbeafe" stroke="#2563eb" />
  <text class="lab" x="510" y="228">📢 Event Bus</text>
  <text class="lab" x="510" y="248">→ tüketicilere</text>

  <path class="arr" d="M 160 155 L 220 155" />
  <path class="arr-dash" d="M 440 130 L 490 70" />
  <path class="arr" d="M 580 100 L 580 200" />
</svg>
