<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 300" role="img" aria-labelledby="kb-t kb-d">
  <title id="kb-t">Olay Yayını — Sipariş örneği</title>
  <desc id="kb-d">Sipariş modülü duyuru atar; muhasebe, kargo ve stok modülleri bağımsız tepki verir.</desc>
  <style>
    .lab { font: 600 14px 'Inter', sans-serif; fill: #1f2937; }
    .head { font: 700 16px 'Inter', sans-serif; fill: #fff; }
    .arr { stroke: #94a3b8; stroke-width: 2; fill: none; marker-end: url(#ar2); }
  </style>
  <defs>
    <marker id="ar2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#94a3b8"/>
    </marker>
  </defs>
  <rect x="30" y="120" width="180" height="60" rx="10" fill="#0f766e" />
  <text class="head" x="60" y="155">Sipariş modülü</text>
  <text class="lab" x="65" y="172" fill="#a7f3d0">"OrderPlaced"</text>

  <rect x="280" y="115" width="140" height="70" rx="8" fill="#fef3c7" stroke="#f59e0b" />
  <text class="head" x="305" y="142" fill="#92400e">Event Bus</text>
  <text class="lab" x="305" y="162">duyuru yapar</text>
  <text class="lab" x="305" y="178">📢 broadcast</text>

  <rect x="490" y="20"  width="180" height="60" rx="8" fill="#dbeafe" stroke="#2563eb" />
  <text class="lab" x="510" y="48">💰 Muhasebe</text>
  <text class="lab" x="510" y="68">→ fatura üret</text>

  <rect x="490" y="110" width="180" height="60" rx="8" fill="#dbeafe" stroke="#2563eb" />
  <text class="lab" x="510" y="138">📦 Kargo</text>
  <text class="lab" x="510" y="158">→ gönderi aç</text>

  <rect x="490" y="200" width="180" height="60" rx="8" fill="#dbeafe" stroke="#2563eb" />
  <text class="lab" x="510" y="228">📊 Stok</text>
  <text class="lab" x="510" y="248">→ adet düş</text>

  <path class="arr" d="M 210 150 L 280 150" />
  <path class="arr" d="M 420 140 L 490 50" />
  <path class="arr" d="M 420 150 L 490 140" />
  <path class="arr" d="M 420 160 L 490 230" />
</svg>
