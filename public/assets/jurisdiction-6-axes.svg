<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="j6t j6d">
  <title id="j6t">6-eksen orthogonal uluslararasılaştırma modeli</title>
  <desc id="j6d">Locale, Jurisdiction, Currency, Tax, Timezone, Data Residency — birbirinden bağımsız 6 eksen</desc>
  <rect width="800" height="500" fill="white"/>
  <text x="400" y="36" font-family="Roboto,sans-serif" font-size="20" font-weight="500" fill="#0f172a" text-anchor="middle">6-Eksen Orthogonal Model — Policy Resolver</text>
  <text x="400" y="58" font-family="Roboto,sans-serif" font-size="13" fill="#64748b" text-anchor="middle">Her eksen bağımsız çözülür → Policy Set hesaplanır → UI/business/billing tüketir</text>

  <!-- Request -->
  <rect x="40" y="100" width="140" height="60" rx="8" fill="#1e293b"/>
  <text x="110" y="130" font-family="Roboto,sans-serif" font-size="14" fill="white" text-anchor="middle" font-weight="500">REQUEST</text>
  <text x="110" y="148" font-family="Roboto,sans-serif" font-size="11" fill="#cbd5e1" text-anchor="middle">user + context</text>

  <!-- 6 axis resolvers -->
  <g font-family="Roboto,sans-serif" font-size="13" fill="#0f172a">
    <rect x="230" y="80" width="180" height="48" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="240" y="100" font-weight="500">Locale</text>
    <text x="240" y="118" font-size="11" fill="#1e40af">URL > pref > header</text>

    <rect x="230" y="135" width="180" height="48" rx="6" fill="#d1fae5" stroke="#10b981" stroke-width="1.5"/>
    <text x="240" y="155" font-weight="500">Jurisdiction</text>
    <text x="240" y="173" font-size="11" fill="#065f46">user + service country</text>

    <rect x="230" y="190" width="180" height="48" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="240" y="210" font-weight="500">Currency</text>
    <text x="240" y="228" font-size="11" fill="#92400e">account / payment</text>

    <rect x="230" y="245" width="180" height="48" rx="6" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5"/>
    <text x="240" y="265" font-weight="500">Tax region</text>
    <text x="240" y="283" font-size="11" fill="#5b21b6">delivery + service type</text>

    <rect x="230" y="300" width="180" height="48" rx="6" fill="#fce7f3" stroke="#ec4899" stroke-width="1.5"/>
    <text x="240" y="320" font-weight="500">Timezone</text>
    <text x="240" y="338" font-size="11" fill="#9d174d">IANA TZ name</text>

    <rect x="230" y="355" width="180" height="48" rx="6" fill="#fee2e2" stroke="#ef4444" stroke-width="1.5"/>
    <text x="240" y="375" font-weight="500">Data residency</text>
    <text x="240" y="393" font-size="11" fill="#991b1b">jurisdiction → storage</text>
  </g>

  <!-- Arrows from REQUEST to each axis -->
  <g stroke="#94a3b8" stroke-width="1.5" fill="none">
    <line x1="180" y1="130" x2="230" y2="104"/>
    <line x1="180" y1="130" x2="230" y2="159"/>
    <line x1="180" y1="130" x2="230" y2="214"/>
    <line x1="180" y1="130" x2="230" y2="269"/>
    <line x1="180" y1="130" x2="230" y2="324"/>
    <line x1="180" y1="130" x2="230" y2="379"/>
  </g>

  <!-- Policy Set merger -->
  <rect x="470" y="180" width="170" height="120" rx="10" fill="#0f172a"/>
  <text x="555" y="210" font-family="Roboto,sans-serif" font-size="14" fill="white" text-anchor="middle" font-weight="500">Policy Set</text>
  <text x="555" y="232" font-family="Roboto,sans-serif" font-size="11" fill="#cbd5e1" text-anchor="middle">versiyonlu config-as-data</text>
  <text x="555" y="252" font-family="Roboto,sans-serif" font-size="11" fill="#cbd5e1" text-anchor="middle">decision_trace audit</text>
  <text x="555" y="272" font-family="Roboto,sans-serif" font-size="11" fill="#cbd5e1" text-anchor="middle">cache TTL + invalidation</text>

  <!-- Arrows from axes to Policy Set -->
  <g stroke="#475569" stroke-width="1.5" fill="none">
    <path d="M 410 104 Q 440 130 470 200" />
    <path d="M 410 159 L 470 220" />
    <path d="M 410 214 L 470 240" />
    <path d="M 410 269 L 470 260" />
    <path d="M 410 324 Q 440 290 470 280" />
    <path d="M 410 379 Q 440 320 470 300" />
  </g>

  <!-- Consumers -->
  <g font-family="Roboto,sans-serif" font-size="12" fill="#0f172a">
    <rect x="680" y="100" width="100" height="40" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/>
    <text x="730" y="125" text-anchor="middle">UI</text>

    <rect x="680" y="155" width="100" height="40" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/>
    <text x="730" y="180" text-anchor="middle">Business</text>

    <rect x="680" y="210" width="100" height="40" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/>
    <text x="730" y="235" text-anchor="middle">Billing</text>

    <rect x="680" y="265" width="100" height="40" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/>
    <text x="730" y="290" text-anchor="middle">Notification</text>

    <rect x="680" y="320" width="100" height="40" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/>
    <text x="730" y="345" text-anchor="middle">Storage</text>
  </g>

  <!-- Policy Set → Consumers -->
  <g stroke="#0f172a" stroke-width="1.5" fill="none" marker-end="url(#a-end)">
    <line x1="640" y1="220" x2="680" y2="120"/>
    <line x1="640" y1="230" x2="680" y2="175"/>
    <line x1="640" y1="240" x2="680" y2="230"/>
    <line x1="640" y1="250" x2="680" y2="285"/>
    <line x1="640" y1="260" x2="680" y2="340"/>
  </g>
  <defs>
    <marker id="a-end" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#0f172a"/>
    </marker>
  </defs>

  <!-- Bottom note -->
  <text x="400" y="450" font-family="Roboto,sans-serif" font-size="13" fill="#475569" text-anchor="middle" font-weight="500">Klasik HATA: hepsini locale'a bağlamak</text>
  <text x="400" y="470" font-family="Roboto,sans-serif" font-size="12" fill="#64748b" text-anchor="middle">Almanya'da yaşayan Türk: locale=tr, jurisdiction=DE, currency=EUR, tax=DE, tz=Berlin, residency=EU</text>
</svg>