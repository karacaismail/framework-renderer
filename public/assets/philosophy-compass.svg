<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 300" role="img" aria-labelledby="ph-t ph-d">
  <title id="ph-t">7 Ana Prensip — Pusula</title>
  <desc id="ph-d">Tek-parça monolit, metadata-driven, AI-first, polyglot hook, scale primitives kernel'de, Türkiye uyumu, açık gerilimler.</desc>
  <style>
    .lab { font: 600 13px 'Inter', sans-serif; fill: #1f2937; }
    .head { font: 700 16px 'Inter', sans-serif; fill: #6366f1; }
  </style>
  <text class="head" x="280" y="35">7 Ana Prensip</text>
  <g transform="translate(40, 60)">
    <rect width="190" height="60" rx="8" fill="#eef2ff" stroke="#6366f1"/>
    <text class="lab" x="14" y="32">1 · Modüler monolit</text>
    <text class="lab" x="14" y="50" fill="#6b7280">tek deploy, sıkı sınır</text>
  </g>
  <g transform="translate(255, 60)">
    <rect width="190" height="60" rx="8" fill="#eef2ff" stroke="#6366f1"/>
    <text class="lab" x="14" y="32">2 · Metadata-driven</text>
    <text class="lab" x="14" y="50" fill="#6b7280">DocType kart yöntemi</text>
  </g>
  <g transform="translate(470, 60)">
    <rect width="190" height="60" rx="8" fill="#eef2ff" stroke="#6366f1"/>
    <text class="lab" x="14" y="32">3 · AI-first</text>
    <text class="lab" x="14" y="50" fill="#6b7280">altyapıda yapay zeka</text>
  </g>
  <g transform="translate(40, 130)">
    <rect width="190" height="60" rx="8" fill="#eef2ff" stroke="#6366f1"/>
    <text class="lab" x="14" y="32">4 · Polyglot hook</text>
    <text class="lab" x="14" y="50" fill="#6b7280">Python + TS yan yana</text>
  </g>
  <g transform="translate(255, 130)">
    <rect width="190" height="60" rx="8" fill="#eef2ff" stroke="#6366f1"/>
    <text class="lab" x="14" y="32">5 · Scale primitive</text>
    <text class="lab" x="14" y="50" fill="#6b7280">kernel'e gömük</text>
  </g>
  <g transform="translate(470, 130)">
    <rect width="190" height="60" rx="8" fill="#eef2ff" stroke="#6366f1"/>
    <text class="lab" x="14" y="32">6 · Türkiye uyumu</text>
    <text class="lab" x="14" y="50" fill="#6b7280">e-fatura, SGK, KVKK</text>
  </g>
  <g transform="translate(150, 200)">
    <rect width="400" height="60" rx="8" fill="#fef3c7" stroke="#f59e0b"/>
    <text class="lab" x="14" y="32" fill="#92400e">7 · Doğru gerilimler — yazılı olarak savunulur</text>
    <text class="lab" x="14" y="50" fill="#6b7280">kernel ↔ battery-included · headless ↔ coupled · RLS ↔ schema</text>
  </g>
</svg>
