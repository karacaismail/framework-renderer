<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 280" role="img" aria-labelledby="sb-t sb-d">
  <title id="sb-t">Bitemporal Kayıt — valid_time + system_time</title>
  <desc id="sb-d">Olayın gerçek zamanı + sisteme yazılma zamanı ayrı tutulur; \"o tarihte ne biliyorduk\" sorgu mümkün.</desc>
  <style>
    .lab { font: 600 13px 'Inter', sans-serif; fill: #1f2937; }
    .head { font: 700 15px 'Inter', sans-serif; fill: #fff; }
    .axis { stroke: #64748b; stroke-width: 1.5; }
    .row { fill: #dbeafe; stroke: #2563eb; stroke-width: 1.5; }
  </style>
  <text class="head" x="280" y="30" fill="#1f2937">Maaş kaydı — Ocak ay sonu</text>

  <line class="axis" x1="120" y1="60" x2="120" y2="240"/>
  <line class="axis" x1="120" y1="240" x2="650" y2="240"/>
  <text class="lab" x="60" y="100">system</text>
  <text class="lab" x="60" y="115">_time</text>
  <text class="lab" x="610" y="260">valid_time</text>

  <rect class="row" x="160" y="80" width="160" height="40" rx="4"/>
  <text class="lab" x="170" y="105">v=2024-01-31 · 5000₺</text>

  <rect class="row" x="160" y="130" width="280" height="40" rx="4"/>
  <text class="lab" x="170" y="155">v=2024-01-31 · 5500₺ (zam)</text>

  <rect class="row" x="160" y="180" width="400" height="40" rx="4"/>
  <text class="lab" x="170" y="205">v=2024-01-31 · 5500₺ + prim 400₺</text>

  <text class="lab" x="120" y="80" fill="#6b7280">Şub 1</text>
  <text class="lab" x="120" y="130" fill="#6b7280">Mar 15</text>
  <text class="lab" x="120" y="180" fill="#6b7280">Nis 5</text>

  <text class="lab" x="330" y="265" fill="#6b7280">↑ Ocak ay-sonu görüntüsü tek satırdır; hangi tarihten bakarsan</text>
  <text class="lab" x="380" y="280" fill="#6b7280">o zamanki kaydı görürsün — silme/üzerine yazma yok.</text>
</svg>
